<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Acessos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex justify-center">

  <div class="w-full max-w-6xl px-6 pt-2 text-center">

    <!-- LOGO -->
    <img src="logo.jpg" alt="Logo"
      class="mx-auto mb-4 w-40">

    <!-- TÍTULO -->
    <h1 class="text-3xl font-bold text-white mb-8">Painel de Acessos</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- Monitor -->
      <a href="https://vivere.infinityfreeapp.com/monitor/?i=1" target="_blank"
        class="bg-white/10 p-6 rounded-2xl text-white text-center hover:scale-105 transition">
        <h2 class="text-xl font-semibold">📡 Monitor</h2>
        <p class="text-sm opacity-70 mt-2">Status dos servidores</p>
      </a>

      <!-- QR Code -->
      <a href="https://177.136.206.166/portal/printqr.html" target="_blank"
        class="bg-white/10 p-6 rounded-2xl text-white text-center hover:scale-105 transition">
        <h2 class="text-xl font-semibold">📱 QR Code</h2>
        <p class="text-sm opacity-70 mt-2">Gerador de acesso</p>
      </a>

      <!-- Projetos -->
      <a href="https://drive.google.com/drive/folders/0AC0VKs75EVgkUk9PVA" target="_blank"
        class="bg-white/10 p-6 rounded-2xl text-white text-center hover:scale-105 transition">
        <h2 class="text-xl font-semibold">📁 Projetos</h2>
        <p class="text-sm opacity-70 mt-2">Google Drive</p>
      </a>

      <!-- Dashboard Projetos -->
      <a href="projetos.html" target="_blank"
        class="bg-white/10 p-6 rounded-2xl text-white text-center hover:scale-105 transition">
        <h2 class="text-xl font-semibold">📊 Dashboard Projetos</h2>
        <p class="text-sm opacity-70 mt-2">Abrir opções</p>
      </a>

      <!-- Portais -->
      <a href="portais.html" target="_blank"
        class="bg-white/10 p-6 rounded-2xl text-white text-center hover:scale-105 transition">
        <h2 class="text-xl font-semibold">🏥 Portais</h2>
        <p class="text-sm opacity-70 mt-2">Acesso pacientes</p>
      </a>

    </div>

  </div>

</body>
</html>
